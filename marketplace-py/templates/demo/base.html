<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Demo{% endblock %} — Native Language Market</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #f8f6f3;
            color: #1e293b;
            line-height: 1.7;
        }
        /* Nav */
        .demo-nav {
            background: #fff;
            border-bottom: 1px solid #e7e5e4;
            padding: 0 1.5rem;
            position: sticky;
            top: 0;
            z-index: 50;
        }
        .demo-nav-inner {
            max-width: 960px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 2rem;
            height: 56px;
        }
        .demo-nav-brand {
            font-weight: 700;
            color: #1a365d;
            text-decoration: none;
            font-size: 0.95rem;
            white-space: nowrap;
        }
        .demo-nav-brand span { color: #c2410c; }
        .demo-nav-links {
            display: flex;
            gap: 0;
            list-style: none;
            height: 100%;
        }
        .demo-nav-links a {
            display: flex;
            align-items: center;
            padding: 0 1rem;
            height: 56px;
            text-decoration: none;
            color: #64748b;
            font-size: 0.9rem;
            font-weight: 500;
            border-bottom: 2px solid transparent;
            transition: all 0.15s;
        }
        .demo-nav-links a:hover { color: #1e293b; }
        .demo-nav-links a.active {
            color: #c2410c;
            border-bottom-color: #c2410c;
        }
        .demo-nav-cta {
            margin-left: auto;
        }
        .demo-nav-cta a {
            background: #c2410c;
            color: #fff;
            padding: 0.5rem 1.25rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.85rem;
            transition: background 0.2s;
        }
        .demo-nav-cta a:hover { background: #9a3412; }

        /* Layout */
        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: 0 1.5rem 4rem;
        }

        /* Section */
        .section { margin-top: 3rem; }
        .section-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: #c2410c;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        .section-title {
            font-size: 1.75rem;
            font-weight: 700;
            color: #1a365d;
            margin-bottom: 0.5rem;
            line-height: 1.3;
        }
        .section-subtitle {
            color: #64748b;
            font-size: 1.05rem;
            margin-bottom: 1.5rem;
            max-width: 640px;
        }

        /* Stats */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 1rem;
        }
        .stat {
            background: #fff;
            border: 1px solid #e7e5e4;
            border-radius: 12px;
            padding: 1.25rem;
            text-align: center;
        }
        .stat .number {
            font-size: 2rem;
            font-weight: 700;
            color: #c2410c;
            display: block;
            line-height: 1.2;
        }
        .stat .label {
            font-size: 0.75rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-top: 0.25rem;
        }

        /* Cards */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.25rem;
        }
        .demo-card {
            background: #fff;
            border: 1px solid #e7e5e4;
            border-radius: 12px;
            padding: 1.75rem;
        }
        .demo-card h3 {
            color: #1a365d;
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
        }
        .demo-card p {
            color: #475569;
            font-size: 0.95rem;
            margin: 0;
        }
        .demo-card .icon {
            font-size: 1.75rem;
            margin-bottom: 0.75rem;
        }
        .demo-card-accent {
            border-left: 3px solid #c2410c;
        }

        /* Quote / callout */
        .callout {
            background: #fef7ed;
            border: 1px solid #fed7aa;
            border-radius: 12px;
            padding: 1.5rem 2rem;
            margin: 1.5rem 0;
        }
        .callout p { color: #9a3412; font-size: 0.95rem; }
        .callout strong { color: #7c2d12; }

        /* Buttons */
        .btn-demo {
            display: inline-block;
            padding: 0.65rem 1.5rem;
            background: #c2410c;
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.2s;
        }
        .btn-demo:hover {
            background: #9a3412;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(194,65,12,0.3);
        }
        .btn-outline {
            background: transparent;
            color: #c2410c;
            border: 1.5px solid #c2410c;
        }
        .btn-outline:hover {
            background: #fef7ed;
            box-shadow: none;
            transform: none;
        }

        /* Table */
        .login-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #e7e5e4;
        }
        .login-table th {
            text-align: left;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #64748b;
            padding: 0.75rem 1rem;
            background: #fafaf9;
            border-bottom: 1px solid #e7e5e4;
        }
        .login-table td {
            padding: 0.65rem 1rem;
            border-bottom: 1px solid #f5f5f4;
            vertical-align: top;
        }
        .login-table tr:last-child td { border-bottom: none; }
        .login-table tr:hover td { background: #fafaf9; }
        .username {
            font-family: 'SF Mono', 'Consolas', monospace;
            color: #c2410c;
            font-weight: 600;
            white-space: nowrap;
        }
        .badge {
            display: inline-block;
            font-size: 0.65rem;
            padding: 0.15rem 0.5rem;
            border-radius: 6px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }
        .badge-audio { background: #dcfce7; color: #166534; }
        .badge-sub { background: #fef3c7; color: #92400e; }
        .badge-done { background: #dbeafe; color: #1d4ed8; }

        /* Password box */
        .password-box {
            background: #1a365d;
            color: #fff;
            border-radius: 10px;
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
        }
        .password-box code {
            font-size: 1.5rem;
            font-weight: 700;
            color: #fb923c;
            letter-spacing: 0.1em;
        }

        /* Steps */
        .steps { counter-reset: step; }
        .step {
            background: #fff;
            border: 1px solid #e7e5e4;
            border-radius: 12px;
            padding: 1.5rem 1.5rem 1.5rem 4rem;
            margin-bottom: 1rem;
            position: relative;
        }
        .step::before {
            counter-increment: step;
            content: counter(step);
            position: absolute;
            left: 1.25rem;
            top: 1.5rem;
            width: 2rem;
            height: 2rem;
            background: #c2410c;
            color: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.9rem;
        }
        .step strong { color: #1a365d; }
        .step p { color: #475569; font-size: 0.95rem; margin-top: 0.25rem; }
        .step code {
            background: #f1f5f9;
            padding: 0.15rem 0.5rem;
            border-radius: 4px;
            font-size: 0.85rem;
            color: #c2410c;
        }

        /* Hero */
        .hero {
            padding: 3.5rem 1.5rem;
            text-align: center;
        }
        .hero h1 {
            font-size: 2.5rem;
            font-weight: 300;
            color: #1a365d;
            margin-bottom: 0.5rem;
            line-height: 1.2;
        }
        .hero h1 strong { font-weight: 700; color: #c2410c; }
        .hero .subtitle {
            color: #64748b;
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Responsive */
        @media (max-width: 640px) {
            .hero h1 { font-size: 1.75rem; }
            .section-title { font-size: 1.35rem; }
            .stats { grid-template-columns: repeat(2, 1fr); }
            .demo-nav-links a { padding: 0 0.65rem; font-size: 0.8rem; }
            .step { padding-left: 3.5rem; }
        }

        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>

<nav class="demo-nav">
    <div class="demo-nav-inner">
        <a href="/demo/" class="demo-nav-brand">Native Language <span>Market</span></a>
        <ul class="demo-nav-links">
            <li><a href="/demo/" class="{% if page == 'story' %}active{% endif %}">The Problem</a></li>
            <li><a href="/demo/walkthrough/" class="{% if page == 'walkthrough' %}active{% endif %}">Walkthrough</a></li>
            <li><a href="/demo/logins/" class="{% if page == 'logins' %}active{% endif %}">Logins</a></li>
        </ul>
        <div class="demo-nav-cta">
            <a href="/browse/">Enter Marketplace</a>
        </div>
    </div>
</nav>

<div class="container">
    {% block content %}{% endblock %}
</div>

</body>
</html>
